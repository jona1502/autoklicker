<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoKlicker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <span class="title">AutoKlicker</span>
    <span class="subtitle">Browser Extension</span>
  </div>

  <div class="section">
    <label class="label">Ziel-Element</label>
    <div class="input-row">
      <input
        id="selectorInput"
        type="text"
        class="input"
        placeholder="#button-id  /  .btn-class  /  button"
        spellcheck="false"
      />
      <button id="pickBtn" class="btn btn-pick" title="Element im Tab auswählen">
        &#x1F3AF;
      </button>
    </div>
    <div id="selectorStatus" class="status-hint"></div>
    <div id="pickerDelayRow" class="delay-row">
      <label class="label" style="margin:0">Verzögerung</label>
      <input id="pickerDelay" type="number" class="input delay-input" min="0" max="10" value="3" />
      <span class="interval-label">sek</span>
      <span class="delay-hint">— Zeit zum Öffnen von Menüs</span>
    </div>
  </div>

  <div class="section">
    <label class="label">Klick-Intervall</label>
    <div class="interval-row">
      <div class="interval-group">
        <input id="inputHours" type="number" class="input interval-input" min="0" max="99" value="0" />
        <span class="interval-label">h</span>
      </div>
      <div class="interval-group">
        <input id="inputMinutes" type="number" class="input interval-input" min="0" max="59" value="0" />
        <span class="interval-label">min</span>
      </div>
      <div class="interval-group">
        <input id="inputSeconds" type="number" class="input interval-input" min="0" max="59" value="1" />
        <span class="interval-label">sek</span>
      </div>
      <div class="interval-group">
        <input id="inputMs" type="number" class="input interval-input" min="0" max="999" value="0" />
        <span class="interval-label">ms</span>
      </div>
    </div>
    <div id="intervalWarning" class="warning hidden"></div>
  </div>

  <div class="section">
    <label class="label">Klick-Optionen</label>
    <div class="option-grid">
      <div>
        <span class="sub-label">Maus-Taste</span>
        <select id="mouseButton" class="input">
          <option value="left">Links</option>
          <option value="right">Rechts</option>
          <option value="middle">Mittel</option>
        </select>
      </div>
      <div>
        <span class="sub-label">Klick-Typ</span>
        <select id="clickType" class="input">
          <option value="single">Single</option>
          <option value="double">Double</option>
          <option value="triple">Triple</option>
        </select>
      </div>
    </div>
  </div>

  <div class="section">
    <label class="label">Wiederholung</label>
    <div class="radio-row">
      <label class="radio-label">
        <input type="radio" name="repeatMode" value="untilStopped" checked /> Bis zum Stopp
      </label>
      <label class="radio-label">
        <input type="radio" name="repeatMode" value="count" /> Anzahl
      </label>
    </div>
    <input id="repeatInput" type="number" class="input repeat-input" min="1" value="1" disabled />
  </div>

  <div id="statsBar" class="stats-bar hidden">
    Geklickt: <span id="clickCount">0</span>
    <span id="limitInfo"></span>
    <div id="eventInfo" class="event-info">Script-Klicks: isTrusted=false</div>
  </div>

  <div class="btn-row">
    <button id="startBtn" class="btn btn-start">&#9654; Start</button>
    <button id="stopBtn" class="btn btn-stop hidden">&#9646;&#9646; Stop</button>
  </div>

  <div id="errorMsg" class="error hidden"></div>

  <script src="popup.js"></script>
</body>
</html>
