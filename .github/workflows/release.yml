name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: EXE bauen
        run: pyinstaller --noconfirm autoklicker.spec

      - name: Extension packen
        run: Compress-Archive -Path extension\* -DestinationPath dist\AutoKlicker-Extension.zip
        shell: pwsh

      - name: Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          name: AutoKlicker ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/AutoKlicker.exe
            dist/AutoKlicker-Extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
