name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: EXE bauen
        run: pyinstaller --noconfirm autoklicker.spec

      - name: Chrome MV3 Extension packen
        run: Compress-Archive -Path extension\* -DestinationPath dist\AutoKlicker-Chrome-MV3.zip
        shell: pwsh

      - name: Brave MV3 Extension packen
        run: Compress-Archive -Path extension\* -DestinationPath dist\AutoKlicker-Brave-MV3.zip
        shell: pwsh

      - name: Legacy MV2 Extension packen
        run: |
          Copy-Item -Recurse extension dist\extension-mv2
          Copy-Item dist\extension-mv2\manifest.v2.json dist\extension-mv2\manifest.json -Force
          Remove-Item dist\extension-mv2\manifest.v2.json
          Compress-Archive -Path dist\extension-mv2\* -DestinationPath dist\AutoKlicker-Legacy-MV2.zip
        shell: pwsh

      - name: Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          name: AutoKlicker ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/AutoKlicker.exe
            dist/AutoKlicker-Chrome-MV3.zip
            dist/AutoKlicker-Brave-MV3.zip
            dist/AutoKlicker-Legacy-MV2.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
