name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: EXE bauen
        run: pyinstaller --noconfirm autoklicker.spec

      - name: Chrome MV3 Extension packen
        run: Compress-Archive -Path extension\* -DestinationPath dist\AutoKlicker-Chrome-MV3.zip
        shell: pwsh

      - name: Brave MV3 Extension packen
        run: Compress-Archive -Path extension\* -DestinationPath dist\AutoKlicker-Brave-MV3.zip
        shell: pwsh

      - name: Legacy MV2 Extension packen
        run: |
          Copy-Item -Recurse extension dist\extension-mv2
          Copy-Item dist\extension-mv2\manifest.v2.json dist\extension-mv2\manifest.json -Force
          Remove-Item dist\extension-mv2\manifest.v2.json
          Compress-Archive -Path dist\extension-mv2\* -DestinationPath dist\AutoKlicker-Legacy-MV2.zip
        shell: pwsh

      - name: Windows-Release-Artefakte speichern
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: |
            dist/AutoKlicker.exe
            dist/AutoKlicker-Chrome-MV3.zip
            dist/AutoKlicker-Brave-MV3.zip
            dist/AutoKlicker-Legacy-MV2.zip

  build-fedora:
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - name: System-Abhängigkeiten installieren
        run: |
          dnf install -y git python3 python3-pip rpm-build desktop-file-utils binutils libX11 libXtst tk

      - name: Checkout
        uses: actions/checkout@v4

      - name: Python-Abhängigkeiten installieren
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: Linux-Binary bauen
        run: .venv/bin/pyinstaller --noconfirm --clean autoklicker-linux.spec

      - name: RPM-Quellen vorbereiten
        run: |
          mkdir -p rpmbuild/SOURCES rpmbuild/RPMS
          cp dist/autoklicker rpmbuild/SOURCES/autoklicker
          cp packaging/autoklicker.desktop rpmbuild/SOURCES/autoklicker.desktop
          cp icons/mauszeiger.png rpmbuild/SOURCES/autoklicker.png

      - name: Fedora-RPM bauen
        run: |
          VERSION=$(python3 -c 'import re, pathlib; print(re.search(r"APP_VERSION = \"([^\"]+)\"", pathlib.Path("src/gui/theme.py").read_text()).group(1))')
          rpmbuild \
            --define "_topdir $PWD/rpmbuild" \
            --define "_rpmdir $PWD/dist" \
            --define "app_version $VERSION" \
            -bb packaging/autoklicker-fedora.spec

      - name: Fedora-Release-Artefakte speichern
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-fedora
          path: |
            dist/autoklicker
            dist/x86_64/autoklicker-*.rpm

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-fedora

    steps:
      - name: Release-Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          name: AutoKlicker ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
